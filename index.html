<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz App - Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>Quiz App</h1>
  </header>

  <main class="quiz-main">
    <!-- Multiple question cards -->
    <article class="card" data-id="q1">
      <h2 class="card__question">What does HTML stand for?</h2>
      <button class="bookmark" aria-pressed="false" aria-label="Bookmark question">
        <img src="./assets/bookmark.svg" alt="Bookmark" />
      </button>
      <p class="card__answer hidden">
        HTML stands for HyperText Markup Language.
      </p>
      <button class="answer-btn">Show Answer</button>
    </article>

    <article class="card" data-id="q2">
      <h2 class="card__question">What does CSS stand for?</h2>
      <button class="bookmark" aria-pressed="false" aria-label="Bookmark question">
        <img src="./assets/bookmark.svg" alt="Bookmark" />
      </button>
      <p class="card__answer hidden">
        CSS stands for Cascading Style Sheets.
      </p>
      <button class="answer-btn">Show Answer</button>
    </article>

    <!-- Add more cards similarly -->
  </main>

  <nav class="navbar">
    <a href="index.html" class="navbar__link navbar__link--active" aria-current="page">
      <img class="navbar__icon" src="./assets/house.svg" alt="Home" />
    </a>
    <a href="bookmarks.html" class="navbar__link">
      <img class="navbar__icon" src="./assets/bookmark.svg" alt="Bookmarks" />
    </a>
    <a href="form.html" class="navbar__link">
      <img class="navbar__icon" src="./assets/plus-square-svgrepo-com.svg" alt="Add Question" />
    </a>
    <a href="profile.html" class="navbar__link">
      <img class="navbar__icon" src="./assets/circle-user-round.svg" alt="Profile" />
    </a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
