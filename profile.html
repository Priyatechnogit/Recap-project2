<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Profile - Quiz App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    Quiz App
  </header>

  <main class="profile-container">
    <div class="profile-card">
      <div class="profile-avatar">
        <img src="./assets/1514826571.svg" alt="Profile Avatar" />
      </div>
      <h2 class="profile-name">Max Doe</h2>

      <section class="about-me">
        <h3>About me</h3>
        <p>I’m a passionate quiz lover and frontend developer dedicated to building fun and interactive learning experiences.</p>
      </section>

      <div class="stats-grid">
        <div class="stat-item">
          <span id="totalQuestions" class="stat-number">0</span>
          Questions Created
        </div>
        <div class="stat-item">
          <span id="bookmarkedCount" class="stat-number">0</span>
          Bookmarks
        </div>
      </div>

      <div class="dark-mode-toggle">
        <label for="dark-toggle">Dark Mode</label>
        <input type="checkbox" id="dark-toggle" />
      </div>
    </div>
  </main>

  <nav class="navbar">
    <a href="index.html" class="navbar__link">
      <img src="./assets/house.svg" alt="Home" class="navbar__icon" />
    </a>
    <a href="bookmarks.html" class="navbar__link">
      <img src="./assets/bookmark.svg" alt="Bookmarks" class="navbar__icon" />
    </a>
    <a href="form.html" class="navbar__link">
      <img class="navbar__icon" src="./assets/plus-square-svgrepo-com.svg" alt="Add Question" />
    </a>
    <a href="profile.html" class="navbar__link navbar__link--active">
      <img src="./assets/circle-user-round.svg" alt="Profile" class="navbar__icon" />
    </a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
